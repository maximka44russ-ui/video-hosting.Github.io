<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка видео</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>🎓 Загрузить видео</h1>
        <nav>
            <a href="/">Главная</a>
            <span>{{ user.username }}</span>
            <a href="/api/logout">Выйти</a>
        </nav>
    </header>

    <main>
        <form action="/api/upload" method="post" class="upload-form">
            <label for="title">Название видео:</label>
            <input type="text" name="title" required>

            <label for="description">Описание:</label>
            <textarea name="description" rows="4"></textarea>

            <label for="url">Ссылка на YouTube:</label>
            <input type="url" name="url" placeholder="https://youtu.be/..." required>

            <button type="submit">Загрузить</button>
        </form>
    </main>
</body>
</html>
