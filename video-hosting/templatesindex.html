<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Видеохостинг для обучения</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>🎓 Обучающий видеохостинг</h1>
        <nav>
            {% if user %}
                <span>Привет, {{ user.username }}!</span>
                <a href="/upload">Загрузить видео</a>
                <a href="/api/logout">Выйти</a>
            {% else %}
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main>
        <h2>Все видео</h2>
        <div class="video-grid">
            {% for video in videos %}
            <div class="video-card">
                <a href="/video/{{ video.id }}">
                    <img src="https://img.youtube.com/vi/{{ video.url.split('=')[-1] }}/0.jpg" alt="{{ video.title }}">
                    <h3>{{ video.title }}</h3>
                </a>
                <p>{{ video.views }} просмотров</p>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
